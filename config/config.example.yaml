project:
  language: "es"
  verbose: 1

paths:
  h5_path: "data/raw/gait_study_data.h5"
  registry_csv: "data/tests.csv"
  output_metrics: "reports/data/metrics_summary.csv"
  output_plot: "reports/plots/gait_segmentation.png"

processing:
  fs: 100.0
  cutoff_pressure: 20.0
  cutoff_gyro: 5.0
  gyro_threshold: 150.0
  min_peak_distance_s: 0.6
  min_peak_height: 0.4
  minute_block_duration_s: 60.0
  step_time_enabled: true   # set to false for patients with very prolonged double support (>50% stride)
  edge_threshold: 0.5
  toe_off_threshold: 0.5
  toe_off_method: "derivative"

batch:
  test_type: "6MWT"
  generate_plots: true

analysis:
  h5_key: "p_RHRHUG004-1/6MWT/start_2025-11-28T12-46-09Z/Right"

influxdb:
  url: "${INFLUXDB_URL}"
  org: "${INFLUXDB_ORG}"
  bucket: "${INFLUXDB_BUCKET}"
  measurement: "${INFLUXDB_MEASUREMENT}"
  token: "${INFLUXDB_TOKEN}"
  verify: ${INFLUXDB_VERIFY}
  timeout: ${INFLUXDB_TIMEOUT}

postgresql:
  host: "${POSTGRES_HOST}"
  user: "${POSTGRES_USER}"
  password: "${POSTGRES_PASSWORD}"
  database: "${POSTGRES_DB}"
  port: ${POSTGRES_PORT}
  schema: "public"
  event_table: "healthywear_event"
  results_table: "healthywear_test_results"

clinical_tests:
  TUG:
    distance_m: 6.0
    min_duration_s: 4.0
    min_strides: 4
  
  T25FW:
    distance_m: 7.62
    min_duration_s: 3.0
    min_strides: 3

gps_estimation:
  # Spatial estimation via GPS for tests without a known fixed distance
  # (typically 6MWT). The trajectory is first smoothed to suppress isolated
  # GPS outliers and a travelled distance is reconstructed using both the
  # direct consecutive path and an indoor corridor approximation. The 100 m
  # threshold is then applied to that reconstructed distance, not to the raw
  # net span from the start point.
  min_span_m: 100.0
  min_unique_points: 10
  max_path_span_ratio: 3.0
  min_turn_episodes: 2

# Spatial estimation models for 6MWT indoor trials where GPS is not
# available. Both models are calibrated using 5 outdoor GPS trials
# from 3 patients. Constants are sensor- and population-specific;
# recalibrate when hardware changes.
spatial_models:
  fallback_priority: ["gyro_norm", "biometric"]
  # Gyro-norm model: stride_length = K_gyro * integral(|G|) during swing.
  # Invariant to sensor orientation. RMSE ~21% on calibration set.
  gyro_norm:
    K: 0.045026
    enabled: true
  # Biometric model: stride_length = K_bio * sqrt(cadence_spm).
  # Based on Weinbach-type regression. RMSE ~11% on calibration set.
  biometric:
    K: 0.196922
    enabled: true
  # IMU + ZUPT via Madgwick filter (prepared for recalibrated ±8g accelerometer).
  # Currently disabled: accelerometer saturates at ±2g, causing orientation drift.
  # Enable when hardware is recalibrated to ±8g.
  imu_zupt:
    enabled: false
    madgwick_beta: 0.1
    use_magnetometer: true
  