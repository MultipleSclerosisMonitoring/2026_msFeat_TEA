project:
  language: "es"
  verbose: 1

paths:
  h5_path: "data/raw/gait_study_data.h5"
  registry_csv: "data/tests.csv"
  output_metrics: "reports/data/metrics_summary.csv"
  output_plot: "reports/plots/gait_segmentation.png"

processing:
  fs: 100.0
  cutoff_pressure: 5.0
  cutoff_gyro: 2.0
  gyro_threshold: 50.0
  min_peak_distance: 50
  min_peak_height: 0.2

batch:
  test_type: "6MWT"
  generate_plots: true

analysis:
  h5_key: "p_EXAMPLE_SUBJECT/6MWT/trial_0"

influxdb:
  url: "https://YOUR_INFLUX_HOST:8086"
  org: "YOUR_ORG"
  bucket: "YOUR_BUCKET"
  token: "YOUR_INFLUXDB_TOKEN"