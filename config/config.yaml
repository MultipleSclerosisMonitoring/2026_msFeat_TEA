project:
  language: "es"
  verbose: 1

paths:
  h5_path: "data/raw/gait_study_data.h5"
  registry_csv: "data/tests.csv"
  output_metrics: "reports/data/metrics_summary.csv"
  output_plot: "reports/plots/gait_segmentation.png"

processing:
  fs: 100.0
  cutoff_pressure: 20.0
  cutoff_gyro: 5.0
  gyro_threshold: 150.0
  min_peak_distance_s: 0.5
  min_peak_height: 0.4
  minute_block_duration_s: 60.0
  edge_threshold: 0.5

batch:
  test_type: "6MWT"
  generate_plots: true

analysis:
  h5_key: "p_RHRHUG004-1/6MWT/start_2025-11-28T12-46-09Z/Left"

influxdb:
  org: "${INFLUXDB_ORG}"
  bucket: "${INFLUXDB_BUCKET}"
  measurement: "${INFLUXDB_MEASUREMENT}"
  url: "${INFLUXDB_URL}"
  token: ${INFLUXDB_TOKEN}
  verify: ${INFLUXDB_VERIFY}
  timeout: ${INFLUXDB_TIMEOUT}

postgresql:
  host: "${POSTGRES_HOST}"
  user: "${POSTGRES_USER}"
  password: "${POSTGRES_PASSWORD}"
  database: "${POSTGRES_DB}"
  port: ${POSTGRES_PORT}

clinical_tests:
  TUG:
    distance_m: 6.0
    min_duration_s: 4.0
    min_strides: 4
  T25FW:
    distance_m: 7.62
    min_duration_s: 3.0
    min_strides: 3